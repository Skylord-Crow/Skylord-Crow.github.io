<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>CSV 2 M3U8</title>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>
    <h1>CSV → M3U8</h1>
    <h2><small>v0.9.0-beta</small></h2>

    <label>Playlist CSV from <a href="https://exportify.net/">Exportify</a>:</label><br>
    <input type="file" id="csvFile" accept=".csv"><br><br>

    <div id="dirSupportWarning" style="color: #c00; display: none;">
        Your browser does not support directory selection.
        Please upload a text file containing music filenames instead.
    </div>
    
    <label>Select Music Folder:</label><br>
    <input type="file" id="musicDir" webkitdirectory multiple><br><br>
    
    <label>OR upload music filename list (.txt):</label><br>
    <input type="file" id="musicList" accept=".txt"><br><br>
    
    <div id="progress"></div>

    <label>Rockbox Root:</label><br>
    <input type="text" id="rockboxRoot" value="/Music"><br><br>

    <button onclick="generate()">Generate M3U8</button>

    <pre id="log"></pre>

    <script src="matcher.utils.js"></script>
    <script src="matcher.worker.js"></script>
    <script src="script.js"></script>
</body>

</html>
